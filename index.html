<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ SEO -->
    <title>MedRemind — Smart Medication Reminder &amp; Adherence System</title>
    <meta name="description"
      content="MedRemind helps patients take their medication on time, enables caregivers to monitor adherence in real time, and allows clinicians to manage schedules efficiently." />

    <!-- ✅ PWA essentials -->
    <!-- theme-color tints the browser chrome on mobile -->
    <meta name="theme-color" content="#6c63ff" />
    <!-- apple-mobile-web-app-capable allows the app to run full-screen when added to home screen on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MedRemind" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PWA Manifest — enables "Add to Home Screen" and standalone display -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <!-- React mounts the entire app inside this div -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
